<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GM Client - Earn Coins by Completing Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #000000 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #1a1a2e;
        }
        body.light-mode .card {
            background: rgba(255,255,255,0.95);
            border-color: #e2e8f0;
            color: #1a1a2e;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .card {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(15,25,45,0.9), rgba(30,40,60,0.8));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: 800; color: #f59e0b; }
        .stat-label { font-size: 12px; color: #94a3b8; margin-top: 5px; }
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .task-card {
            background: rgba(10, 20, 35, 0.9);
            border-radius: 20px;
            padding: 20px;
            border-left: 4px solid;
            transition: all 0.3s;
        }
        .task-card:hover { transform: translateY(-3px); }
        .priority-high { border-left-color: #ef4444; }
        .priority-medium { border-left-color: #f59e0b; }
        .priority-low { border-left-color: #22c55e; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-success { background: #22c55e20; color: #86efac; border: 1px solid #22c55e40; }
        .badge-warning { background: #f59e0b20; color: #fcd34d; border: 1px solid #f59e0b40; }
        .badge-info { background: #3b82f620; color: #93c5fd; border: 1px solid #3b82f640; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .mt-2 { margin-top: 12px; }
        .text-warning { color: #fcd34d; }
        .text-info { color: #7dd3fc; }
        .video-thumbnail {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin-top: 10px;
        }
        .channel-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .verification-code {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 5px;
            background: #1a1a2e;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin: 10px 0;
        }
        .countdown-timer {
            font-size: 48px;
            font-weight: 800;
            color: #22c55e;
            text-align: center;
            padding: 20px;
        }
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #3b82f6);
            border-radius: 3px;
            transition: width 0.5s;
        }
        .security-badge {
            background: #22c55e20;
            border: 1px solid #22c55e;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .floating-actions {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 12px;
            z-index: 1000;
        }
        .floating-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .coin-animation {
            animation: coinPop 0.5s ease;
        }
        @keyframes coinPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #f59e0b; }
            100% { transform: scale(1); }
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .task-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="floating-actions">
    <div class="floating-btn" onclick="toggleTheme()"><i class="fas fa-moon" style="font-size: 22px;"></i></div>
    <div class="floating-btn" onclick="showHelp()" style="background: linear-gradient(135deg, #3b82f6, #2563eb);"><i class="fas fa-question" style="font-size: 22px;"></i></div>
</div>

<div class="container">
    <div class="card">
        <div class="flex-between">
            <div>
                <h1><i class="fas fa-user-circle"></i> GM Client Dashboard</h1>
                <p><span class="security-badge"><i class="fas fa-shield-alt"></i> Secure Platform</span></p>
            </div>
            <div><span id="currentDateTime"></span></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-coins"></i><div class="stat-value" id="clientCoins">0</div><div class="stat-label">Your Coins</div></div>
        <div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-value" id="completedCount">0</div><div class="stat-label">Tasks Done</div></div>
        <div class="stat-card"><i class="fas fa-tasks"></i><div class="stat-value" id="videoTasksCount">0</div><div class="stat-label">Video Tasks</div></div>
        <div class="stat-card"><i class="fas fa-heart"></i><div class="stat-value" id="engagementTasksCount">0</div><div class="stat-label">Engagement Tasks</div></div>
    </div>

    <!-- Video Tasks Section -->
    <div class="card">
        <h2><i class="fab fa-youtube"></i> Video Tasks <span style="font-size:12px;">(1 sec = 1 coin)</span></h2>
        <div id="videoTasksList" class="task-grid"></div>
    </div>

    <!-- Engagement Tasks Section -->
    <div class="card">
        <h2><i class="fas fa-heart"></i> Engagement Tasks</h2>
        <div id="engagementTasksList" class="task-grid"></div>
    </div>

    <!-- Admin Messages -->
    <div class="card">
        <h2><i class="fas fa-envelope"></i> Messages from Admin</h2>
        <div id="messagesList"></div>
    </div>
</div>

<script>
    // ==================== STORAGE KEYS (Same as Admin Panel) ====================
    const STORAGE_KEYS = {
        videos: 'gm_final_videos',
        completedTasks: 'gm_final_completed',
        totalCompleted: 'gm_final_total',
        adminBalance: 'gm_final_admin_balance',
        clientCoins: 'gm_final_client_coins',
        activityLog: 'gm_final_log',
        engagementTasks: 'gm_final_engagement',
        completedEngagement: 'gm_final_comp_eng',
        commission: 'gm_final_commission',
        clientBanned: 'gm_final_banned',
        clientMessages: 'gm_final_client_messages',
        earningsHistory: 'gm_final_earnings_history'
    };

    // ==================== CLIENT STATE ====================
    let clientState = {
        videos: [],
        completedTasks: {},
        engagementTasks: [],
        completedEngagement: {},
        clientCoins: 0,
        totalCompleted: 0,
        messages: [],
        isBanned: false
    };

    let activeTimer = null;
    let activeTimerInterval = null;

    // ==================== UTILITY FUNCTIONS ====================
    function extractYouTubeId(url) {
        const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/embed\/)([^&\n?#]+)/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    function getThumbnail(url) {
        const id = extractYouTubeId(url);
        return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
    }

    function getChannelLogo(url) {
        const id = extractYouTubeId(url);
        return id ? `https://img.youtube.com/vi/${id}/mqdefault.jpg` : 'https://via.placeholder.com/40';
    }

    // ==================== DATA LOADING ====================
    function loadData() {
        // Load video tasks from admin
        clientState.videos = JSON.parse(localStorage.getItem(STORAGE_KEYS.videos)) || [];
        clientState.completedTasks = JSON.parse(localStorage.getItem(STORAGE_KEYS.completedTasks)) || {};
        
        // Load engagement tasks from admin
        clientState.engagementTasks = JSON.parse(localStorage.getItem(STORAGE_KEYS.engagementTasks)) || [];
        clientState.completedEngagement = JSON.parse(localStorage.getItem(STORAGE_KEYS.completedEngagement)) || {};
        
        // Load client data
        clientState.clientCoins = parseInt(localStorage.getItem(STORAGE_KEYS.clientCoins)) || 0;
        clientState.totalCompleted = parseInt(localStorage.getItem(STORAGE_KEYS.totalCompleted)) || 0;
        clientState.messages = JSON.parse(localStorage.getItem(STORAGE_KEYS.clientMessages)) || [];
        clientState.isBanned = localStorage.getItem(STORAGE_KEYS.clientBanned) === 'true';
        
        if (clientState.isBanned) {
            document.body.innerHTML = '<div class="container"><div class="card" style="text-align:center;"><i class="fas fa-ban" style="font-size:60px;color:#ef4444;"></i><h2>Account Banned</h2><p>Contact admin for assistance.</p></div></div>';
            return false;
        }
        
        updateUI();
        renderVideoTasks();
        renderEngagementTasks();
        renderMessages();
        return true;
    }

    function saveClientData() {
        localStorage.setItem(STORAGE_KEYS.clientCoins, clientState.clientCoins);
        localStorage.setItem(STORAGE_KEYS.totalCompleted, clientState.totalCompleted);
        localStorage.setItem(STORAGE_KEYS.completedTasks, JSON.stringify(clientState.completedTasks));
        localStorage.setItem(STORAGE_KEYS.completedEngagement, JSON.stringify(clientState.completedEngagement));
    }

    function updateAdminOnCompletion(coins) {
        let commission = parseInt(localStorage.getItem(STORAGE_KEYS.commission)) || 10;
        let adminEarn = (coins * commission) / 100;
        let currentBalance = parseFloat(localStorage.getItem(STORAGE_KEYS.adminBalance)) || 0;
        localStorage.setItem(STORAGE_KEYS.adminBalance, currentBalance + adminEarn);
        
        // Add to activity log
        let activityLog = JSON.parse(localStorage.getItem(STORAGE_KEYS.activityLog)) || [];
        activityLog.unshift({
            id: Date.now(),
            type: 'task_completed',
            title: 'Task Completed',
            details: `Client earned ${coins} coins | Admin earned $${adminEarn.toFixed(2)}`,
            amount: adminEarn,
            timestamp: new Date().toLocaleString()
        });
        localStorage.setItem(STORAGE_KEYS.activityLog, JSON.stringify(activityLog.slice(0, 500)));
    }

    function addToHistory(title, type, coins) {
        let history = JSON.parse(localStorage.getItem(STORAGE_KEYS.earningsHistory)) || [];
        history.unshift({
            id: Date.now(),
            title: title,
            type: type,
            coins: coins,
            timestamp: new Date().toLocaleString()
        });
        localStorage.setItem(STORAGE_KEYS.earningsHistory, JSON.stringify(history.slice(0, 100)));
    }

    function updateUI() {
        document.getElementById('clientCoins').innerHTML = clientState.clientCoins;
        document.getElementById('completedCount').innerHTML = clientState.totalCompleted;
        
        const availableVideos = clientState.videos.filter(v => !clientState.completedTasks[v.id]).length;
        const availableEngagement = clientState.engagementTasks.filter(e => !clientState.completedEngagement[e.id]).length;
        document.getElementById('videoTasksCount').innerHTML = availableVideos;
        document.getElementById('engagementTasksCount').innerHTML = availableEngagement;
    }

    function animateCoins() {
        const el = document.getElementById('clientCoins');
        el.classList.add('coin-animation');
        setTimeout(() => el.classList.remove('coin-animation'), 500);
    }

    // ==================== VIDEO TASK ====================
    function startVideoTask(taskId, taskTitle, taskUrl, watchTime) {
        if (clientState.isBanned) {
            Swal.fire('Banned', 'Your account is banned.', 'error');
            return;
        }
        if (clientState.completedTasks[taskId]) {
            Swal.fire('Already Done', 'You已完成 this task.', 'info');
            return;
        }
        if (activeTimer) {
            Swal.fire('Task Active', 'Complete current task first.', 'warning');
            return;
        }
        
        const verificationCode = Math.floor(100000 + Math.random() * 900000).toString();
        let timeLeft = watchTime;
        let tabHidden = false;
        const thumbnail = getThumbnail(taskUrl);
        
        // Open YouTube
        window.open(taskUrl, '_blank');
        
        // Tab visibility detection
        const visibilityHandler = () => {
            if (document.hidden) {
                tabHidden = true;
            }
        };
        document.addEventListener('visibilitychange', visibilityHandler);
        
        Swal.fire({
            title: '🎬 Watch Video',
            html: `<div style="text-align:center;">
                       ${thumbnail ? `<img src="${thumbnail}" style="width:100%;border-radius:12px;margin-bottom:15px;">` : ''}
                       <h3>${escapeHtml(taskTitle)}</h3>
                       <div class="countdown-timer" id="timer">${timeLeft}</div>
                       <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
                       <p class="mt-2"><strong class="text-warning">💰 ${watchTime} coins</strong></p>
                       <p class="text-danger">⚠️ DO NOT switch tabs!</p>
                   </div>`,
            icon: 'info',
            showConfirmButton: false,
            showCancelButton: true,
            cancelButtonText: 'Cancel',
            didOpen: () => {
                const timerEl = document.getElementById('timer');
                const progressEl = document.getElementById('progress');
                
                activeTimerInterval = setInterval(() => {
                    if (tabHidden) {
                        clearInterval(activeTimerInterval);
                        document.removeEventListener('visibilitychange', visibilityHandler);
                        activeTimer = null;
                        Swal.close();
                        Swal.fire('Cancelled', 'Task cancelled due to tab switch.', 'error');
                        return;
                    }
                    
                    timeLeft--;
                    if (timerEl) timerEl.innerHTML = timeLeft;
                    if (progressEl) {
                        const percent = ((watchTime - timeLeft) / watchTime) * 100;
                        progressEl.style.width = percent + '%';
                    }
                    
                    if (timeLeft <= 0) {
                        clearInterval(activeTimerInterval);
                        document.removeEventListener('visibilitychange', visibilityHandler);
                        activeTimer = null;
                        Swal.close();
                        
                        Swal.fire({
                            title: 'Verification Required',
                            html: `<div style="text-align:center;">
                                       <p>Enter code to claim coins:</p>
                                       <div class="verification-code">${verificationCode}</div>
                                       <input type="text" id="codeInput" class="input" placeholder="Enter code" style="margin-top:15px;padding:12px;border-radius:12px;width:100%;">
                                   </div>`,
                            showCancelButton: true,
                            confirmButtonText: 'Claim',
                            preConfirm: () => {
                                const input = document.getElementById('codeInput').value;
                                if (!input) return 'Enter code';
                                if (input !== verificationCode) return 'Invalid code!';
                                return true;
                            }
                        }).then((result) => {
                            if (result.isConfirmed && result.value === true) {
                                clientState.completedTasks[taskId] = true;
                                clientState.clientCoins += watchTime;
                                clientState.totalCompleted++;
                                saveClientData();
                                updateAdminOnCompletion(watchTime);
                                addToHistory(taskTitle, 'Video Task', watchTime);
                                animateCoins();
                                updateUI();
                                renderVideoTasks();
                                Swal.fire('Success!', `+${watchTime} coins added!`, 'success');
                            }
                        });
                    }
                }, 1000);
                activeTimer = activeTimerInterval;
            },
            willClose: () => {
                if (activeTimerInterval) clearInterval(activeTimerInterval);
                document.removeEventListener('visibilitychange', visibilityHandler);
                activeTimer = null;
            }
        });
    }

    // ==================== ENGAGEMENT TASK ====================
    async function startEngagementTask(taskId, taskTarget, taskType, taskCoins, commentText) {
        if (clientState.isBanned) {
            Swal.fire('Banned', 'Your account is banned.', 'error');
            return;
        }
        if (clientState.completedEngagement[taskId]) {
            Swal.fire('Already Done', 'You已完成 this task.', 'info');
            return;
        }
        
        const verificationCode = Math.floor(100000 + Math.random() * 900000).toString();
        const actionText = { like:'Like', share:'Share', comment:'Comment', subscribe:'Subscribe' }[taskType];
        const actionIcon = { like:'👍', share:'🔄', comment:'💬', subscribe:'🔔' }[taskType];
        const actionColor = { like:'#3b82f6', share:'#22c55e', comment:'#f59e0b', subscribe:'#ef4444' }[taskType];
        const instruction = taskType === 'comment' ? `Post comment: "${commentText || 'Great video!'}"` : `Click ${actionText} button`;
        const thumbnail = getThumbnail(taskTarget);
        const channelLogo = getChannelLogo(taskTarget);
        
        Swal.fire({
            title: `${actionIcon} ${actionText} Task`,
            html: `<div style="text-align:center;">
                       ${thumbnail ? `<img src="${thumbnail}" style="width:100%;border-radius:12px;margin-bottom:15px;">` : ''}
                       <div class="channel-info">
                           <img src="${channelLogo}" class="channel-logo">
                           <div><strong>YouTube Channel</strong></div>
                       </div>
                       <p class="mt-2"><strong>Instruction:</strong> ${instruction}</p>
                       <p><strong>Reward:</strong> <span class="text-warning" style="font-size:24px;">${taskCoins} coins</span></p>
                       <a href="${taskTarget}" target="_blank" class="btn" style="background:${actionColor};margin:15px auto;display:inline-block;">
                           <i class="fas fa-external-link-alt"></i> Go to YouTube
                       </a>
                       <div class="verification-code">${verificationCode}</div>
                       <p class="text-info">Action complete karne ke baad ye code enter karein!</p>
                       <input type="text" id="engCodeInput" class="input" placeholder="Enter code" style="margin-top:10px;padding:12px;border-radius:12px;width:100%;">
                       <button class="btn btn-success mt-2" id="verifyBtn" style="width:100%;">✅ Verify & Earn ${taskCoins} Coins</button>
                   </div>`,
            icon: 'info',
            showConfirmButton: false,
            showCancelButton: true,
            cancelButtonText: 'Cancel',
            didOpen: () => {
                const verifyBtn = document.getElementById('verifyBtn');
                const inputField = document.getElementById('engCodeInput');
                
                verifyBtn.onclick = () => {
                    const enteredCode = inputField.value;
                    if (!enteredCode) {
                        Swal.fire('Error', 'Enter verification code', 'error');
                        return;
                    }
                    if (enteredCode !== verificationCode) {
                        Swal.fire('Invalid Code', 'This attempt has been logged.', 'error');
                        return;
                    }
                    Swal.close();
                    
                    clientState.completedEngagement[taskId] = { completed: true, coins: taskCoins };
                    clientState.clientCoins += taskCoins;
                    clientState.totalCompleted++;
                    saveClientData();
                    updateAdminOnCompletion(taskCoins);
                    addToHistory(`${actionText} Task`, 'Engagement', taskCoins);
                    animateCoins();
                    updateUI();
                    renderEngagementTasks();
                    Swal.fire('Success!', `+${taskCoins} coins added!`, 'success');
                };
            }
        });
    }

    // ==================== RENDER FUNCTIONS ====================
    function renderVideoTasks() {
        const container = document.getElementById('videoTasksList');
        if (!container) return;
        
        const availableTasks = clientState.videos.filter(v => !clientState.completedTasks[v.id]);
        
        if (availableTasks.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-check-circle" style="font-size:48px;color:#22c55e;"></i><p>No video tasks available</p></div>';
            return;
        }
        
        container.innerHTML = availableTasks.map(task => {
            const thumbnail = getThumbnail(task.url);
            return `
                <div class="task-card priority-${task.priority || 'low'}">
                    ${thumbnail ? `<img src="${thumbnail}" class="video-thumbnail" onclick="window.open('${task.url}', '_blank')">` : ''}
                    <div class="flex-between">
                        <strong><i class="fab fa-youtube"></i> ${escapeHtml(task.title)}</strong>
                        <span class="badge badge-warning">Pending</span>
                    </div>
                    <div class="mt-2">
                        <div>💰 Reward: <span class="text-warning">${task.watchTime} coins</span></div>
                        <div>⏱️ Watch Time: ${task.watchTime} seconds</div>
                    </div>
                    <button class="btn btn-primary mt-2" style="width:100%;" onclick="startVideoTask(${task.id}, '${escapeHtml(task.title)}', '${escapeHtml(task.url)}', ${task.watchTime})">
                        <i class="fab fa-youtube"></i> Start & Earn ${task.watchTime} Coins
                    </button>
                </div>
            `;
        }).join('');
    }

    async function renderEngagementTasks() {
        const container = document.getElementById('engagementTasksList');
        if (!container) return;
        
        const availableTasks = clientState.engagementTasks.filter(e => !clientState.completedEngagement[e.id]);
        
        if (availableTasks.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-tasks" style="font-size:48px;color:#3b82f6;"></i><p>No engagement tasks available</p></div>';
            return;
        }
        
        const icons = { like:'👍', share:'🔄', comment:'💬', subscribe:'🔔' };
        const typeNames = { like:'Like', share:'Share', comment:'Comment', subscribe:'Subscribe' };
        const colors = { like:'#3b82f6', share:'#22c55e', comment:'#f59e0b', subscribe:'#ef4444' };
        
        container.innerHTML = availableTasks.map(task => {
            const thumbnail = getThumbnail(task.target);
            const channelLogo = getChannelLogo(task.target);
            return `
                <div class="task-card priority-${task.priority || 'low'}">
                    ${thumbnail ? `<img src="${thumbnail}" class="video-thumbnail" onclick="window.open('${task.target}', '_blank')">` : ''}
                    <div class="channel-info">
                        <img src="${channelLogo}" class="channel-logo">
                        <div><strong>YouTube Channel</strong><div class="text-info">${typeNames[task.type]} Task</div></div>
                    </div>
                    <div class="mt-2">
                        <div>💰 Reward: <span class="text-warning">${task.coins} coins</span></div>
                        ${task.commentText ? `<div class="text-info mt-1">💬 "${escapeHtml(task.commentText)}"</div>` : ''}
                    </div>
                    <button class="btn mt-2" style="width:100%; background:${colors[task.type]}; color:white; border:none; padding:12px; border-radius:14px; cursor:pointer;" onclick="startEngagementTask(${task.id}, '${escapeHtml(task.target)}', '${task.type}', ${task.coins}, '${escapeHtml(task.commentText || '')}')">
                        <i class="fas ${task.type === 'like' ? 'fa-thumbs-up' : task.type === 'share' ? 'fa-share-alt' : task.type === 'comment' ? 'fa-comment' : 'fa-bell'}"></i>
                        Take Action & Earn ${task.coins} Coins
                    </button>
                </div>
            `;
        }).join('');
    }

    function renderMessages() {
        const container = document.getElementById('messagesList');
        if (!container) return;
        
        if (clientState.messages.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-inbox" style="font-size:48px;color:#94a3b8;"></i><p>No messages from admin</p></div>';
            return;
        }
        
        container.innerHTML = clientState.messages.map(msg => `
            <div style="background:rgba(10,20,35,0.8);border-radius:16px;padding:15px;margin-bottom:12px;border-left:3px solid #3b82f6;">
                <div class="flex-between">
                    <span class="badge badge-info"><i class="fas fa-user-shield"></i> Admin</span>
                    <span style="font-size:11px;">${msg.timestamp}</span>
                </div>
                <div class="mt-2">${escapeHtml(msg.message)}</div>
            </div>
        `).join('');
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function updateDateTime() {
        document.getElementById('currentDateTime').innerHTML = new Date().toLocaleString();
    }
    setInterval(updateDateTime, 1000);

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    function showHelp() {
        Swal.fire('How to Earn Coins', 
            '📹 VIDEO TASKS:\n• Click "Start Task"\n• Timer automatically starts\n• YouTube opens in new tab\n• DO NOT switch tabs\n• Timer complete = Enter verification code\n• Coins added instantly\n\n' +
            '🎯 ENGAGEMENT TASKS:\n• Click "Take Action"\n• Complete action on YouTube\n• Enter verification code\n• Coins added instantly\n\n' +
            '⚠️ Tab switch = Task cancelled\n⚠️ Wrong code = Attempt logged', 'info');
    }

    // Make functions global
    window.startVideoTask = startVideoTask;
    window.startEngagementTask = startEngagementTask;
    window.toggleTheme = toggleTheme;
    window.showHelp = showHelp;

    // Initialize
    loadData();
    updateDateTime();
</script>
</body>
</html>
